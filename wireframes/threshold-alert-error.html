<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brio - Wireframe: Threshold alert (4.2) - Error</title>
  <link rel="stylesheet" href="_wf.css">

<body>

<div class="wf-bar" id="wf-bar"></div>

<main>

    <div class="wf-content">
      <header>
        <p class="wf-eyebrow"><a href="dashboard.html">Dashboard</a> / Alert</p>
        <h1>What changed</h1>

      <section aria-label="Could not load this alert">

            <a class="wf-btn solid" href="threshold-alert.html">Try again</a>

          </div>
        </div>
      </section>
    </div>

    <footer class="wf-appfoot" id="wf-appfoot"></footer>
    <nav class="wf-tabbar" id="wf-tabbar" aria-label="Brio app tabs"></nav>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "4.2", file: "threshold-alert-error.html", shell: "operator", tab: "Dashboard" });</script>
