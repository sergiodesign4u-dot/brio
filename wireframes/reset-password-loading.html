<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Brio - Wireframe: Reset password (2.4) - Submitting</title>
  <link rel="stylesheet" href="_wf.css">
  <style>
    .wf-req { list-style: none; margin: 12px 0 18px; padding: 0; }
    .wf-req li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--wf-t-mid); margin-bottom: 7px; }
    .wf-req .mk { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--wf-stroke); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex: none; }
    .wf-req li.met { color: var(--wf-t-2); }
    .wf-req li.met .mk { background: var(--wf-solid); color: var(--wf-solid-ink); border-color: var(--wf-solid); }
  </style>
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow">
        <h1>Set a new password</h1>
        <p class="wf-lead" style="margin-bottom:24px;">Choose a new password to finish getting back into Brio.</p>

        <form>
          <label class="wf-field">
            <span class="k">New password</span>
            <input class="wf-input" type="password" value="correcthorsebatterystaple" disabled>
          </label>
          <label class="wf-field">
            <span class="k">Confirm password</span>
            <input class="wf-input" type="password" value="correcthorsebatterystaple" disabled>
          </label>

          <ul class="wf-req" aria-label="Password requirements">
            <li class="met"><span class="mk" aria-hidden="true">&#10003;</span> At least 12 characters</li>
            <li class="met"><span class="mk" aria-hidden="true">&#10003;</span> Not a commonly breached password</li>
            <li class="met"><span class="mk" aria-hidden="true">&#10003;</span> Both entries match</li>
          </ul>

          <button class="wf-btn solid block" type="button" disabled aria-busy="true">Setting new password...</button>
        </form>

        <p class="wf-micro" style="text-align:center;margin-top:16px;">This finishes on its own, then confirms your <a href="reset-password-success.html">new password is set</a>.</p>
      </div>
    </div>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "2.4", file: "reset-password-loading.html", shell: "auth", authLabel: "Log in", authHref: "login.html" });</script>

</body>
</html>
