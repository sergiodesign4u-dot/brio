<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Brio - Wireframe: Dashboard (4.0) - Cycle open</title>
  <link rel="stylesheet" href="_wf.css">
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio app"></nav>

    <div class="wf-content">
      <header>
        <p class="wf-eyebrow">Welcome back, Priya</p>
        <h1>Your team pulse</h1>
      </header>

      <div class="wf-grid">
        <section aria-label="The current cycle is open">
          <div class="wf-state">
            <div class="n">This cycle is open</div>
            <p class="sub">Results appear after it closes. There is no live count, for anyone, so no one can work out who answered or when.</p>
            <a class="wf-btn" href="program-library.html">Browse programs</a>
          </div>
        </section>

        <aside aria-label="Privacy">
          <div class="wf-card">
            <div class="wf-strip2">Aggregate only. You never see who answered.</div>
            <a class="wf-micro" href="security-privacy.html" style="display:inline-block;margin-top:12px;">What your owner can and cannot see</a>
          </div>
        </aside>
      </div>
    </div>

    <footer class="wf-appfoot" id="wf-appfoot"></footer>
    <nav class="wf-tabbar" id="wf-tabbar" aria-label="Brio app tabs"></nav>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "4.0", file: "dashboard-open.html", shell: "operator", tab: "Dashboard" });</script>

</body>
</html>
