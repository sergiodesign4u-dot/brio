<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Brio - Wireframe: Log in (2.1) - Submitting</title>
  <link rel="stylesheet" href="_wf.css">
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow">
        <h1>Log in to Brio</h1>
        <p class="wf-lead" style="margin-bottom:24px;">Welcome back. Pick up where you left off with your team.</p>

        <form>
          <label class="wf-field">
            <span class="k">Work email</span>
            <input class="wf-input" type="email" value="priya@acme.co" disabled>
          </label>
          <label class="wf-field">
            <span class="k">Password</span>
            <input class="wf-input" type="password" value="password" disabled>
          </label>
          <button class="wf-btn solid block" type="button" disabled aria-busy="true">Logging in...</button>
        </form>

        <p class="wf-micro" style="text-align:center;margin-top:16px;">Signing you in and taking you to your <a href="dashboard.html">dashboard</a>.</p>
      </div>
    </div>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "2.1", file: "login-loading.html", shell: "auth", authLabel: "Sign up", authHref: "signup.html" });</script>

</body>
</html>
