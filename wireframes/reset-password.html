<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Brio - Wireframe: Reset password (2.4) - Default</title>
  <link rel="stylesheet" href="_wf.css">
  <style>
    .wf-showrow { display: flex; align-items: baseline; justify-content: space-between; }
    .wf-show { background: none; border: none; padding: 0; font-family: inherit; font-size: 12px; color: var(--wf-t-mid); text-decoration: underline; cursor: pointer; }
    .wf-req { list-style: none; margin: 12px 0 18px; padding: 0; }
    .wf-req li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--wf-t-mid); margin-bottom: 7px; }
    .wf-req .mk { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--wf-stroke); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex: none; }
    .wf-req li.met { color: var(--wf-t-2); }
    .wf-req li.met .mk { background: var(--wf-solid); color: var(--wf-solid-ink); border-color: var(--wf-solid); }
  </style>
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow">
        <h1>Set a new password</h1>
        <p class="wf-lead" style="margin-bottom:24px;">Choose a new password to finish getting back into Brio.</p>

        <form>
          <label class="wf-field">
            <span class="k wf-showrow"><span>New password</span> <button type="button" class="wf-show">Show</button></span>
            <input class="wf-input" type="password" placeholder="At least 12 characters" autocomplete="new-password">
          </label>
          <label class="wf-field">
            <span class="k">Confirm password</span>
            <input class="wf-input" type="password" placeholder="Re-enter your new password" autocomplete="new-password">
          </label>

          <ul class="wf-req" aria-label="Password requirements">
            <li><span class="mk" aria-hidden="true"></span> At least 12 characters</li>
            <li><span class="mk" aria-hidden="true"></span> Not a commonly breached password</li>
            <li><span class="mk" aria-hidden="true"></span> Both entries match</li>
          </ul>

          <a class="wf-btn solid block" href="reset-password-success.html">Set new password</a>
        </form>

        <p class="wf-micro" style="text-align:center;margin-top:16px;">Setting a new password logs you out on all other devices.</p>
      </div>
    </div>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "2.4", file: "reset-password.html", shell: "auth", authLabel: "Log in", authHref: "login.html" });</script>

</body>
</html>
