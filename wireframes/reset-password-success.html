<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Brio - Wireframe: Reset password (2.4) - Success</title>
  <link rel="stylesheet" href="_wf.css">
  <style>
    .wf-badge { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; margin: 4px auto 18px; }
    .wf-badge.ok { background: var(--wf-solid); color: var(--wf-solid-ink); }
  </style>
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow" style="text-align:center;">
        <div class="wf-badge ok" aria-hidden="true">&#10003;</div>
        <h1>Password updated</h1>
        <p class="wf-lead" style="margin:8px auto 20px;">Your new password is set. For your security, you have been signed out on all other devices.</p>

        <a class="wf-btn solid block" href="login.html">Log in</a>
        <p class="wf-micro" style="text-align:center;margin-top:16px;">Use your new password to log back in.</p>
      </div>
    </div>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "2.4", file: "reset-password-success.html", shell: "auth", authLabel: "Log in", authHref: "login.html" });</script>

</body>
</html>
