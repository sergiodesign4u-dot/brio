<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Brio - Wireframe: Log in (2.1) - Error</title>
  <link rel="stylesheet" href="_wf.css">
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow">
        <h1>Log in to Brio</h1>
        <p class="wf-lead" style="margin-bottom:24px;">Welcome back. Pick up where you left off with your team.</p>

        <form>
          <label class="wf-field">
            <span class="k">Work email</span>
            <input class="wf-input" type="email" value="priya@acme.co" autocomplete="email">
          </label>
          <label class="wf-field">
            <span class="k">Password</span>
            <input class="wf-input" type="password" value="incorrect-password" autocomplete="current-password">
            <span class="wf-err">Your email or password is incorrect. Check both and try again.</span>
          </label>
          <p style="text-align:right;margin:-6px 0 16px;"><a class="wf-micro" href="reset-password.html">Forgot password?</a></p>
          <a class="wf-btn solid block" href="dashboard.html">Log in</a>
        </form>

        <p style="text-align:center;margin:16px 0;"><a class="wf-micro" href="magic-link-sent.html">Email me a link instead</a></p>
        <p class="wf-micro" style="text-align:center;margin-top:16px;">New to Brio? <a href="signup.html">Create an account</a></p>
      </div>
    </div>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "2.1", file: "login-error.html", shell: "auth", authLabel: "Sign up", authHref: "signup.html" });</script>

</body>
</html>
