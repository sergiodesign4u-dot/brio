<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Brio - Wireframe: Team pulse (4.1) - Loading</title>
  <link rel="stylesheet" href="_wf.css">
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio app"></nav>

    <div class="wf-content">
      <header>
        <p class="wf-eyebrow">Dashboard</p>
        <h1>Team pulse</h1>
      </header>

      <div class="wf-grid" aria-busy="true">
        <section aria-label="Loading the pulse">
          <div class="wf-pulse">
            <div class="wf-skel tall" style="width:40%;"></div>
            <div class="wf-skel w50" style="margin-top:14px;"></div>
            <div class="wf-skel w70"></div>
            <div class="wf-skel w50"></div>
            <div class="wf-skel" style="width:200px;height:40px;margin-top:18px;"></div>
          </div>
        </section>

        <aside aria-label="Loading">
          <div class="wf-card">
            <div class="wf-skel w50"></div>
            <div class="wf-skel tall"></div>
            <div class="wf-skel w70"></div>
          </div>
          <div class="wf-card">
            <div class="wf-skel w40"></div>
            <div class="wf-skel w70"></div>
          </div>
        </aside>
      </div>
    </div>

    <footer class="wf-appfoot" id="wf-appfoot"></footer>
    <nav class="wf-tabbar" id="wf-tabbar" aria-label="Brio app tabs"></nav>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "4.1", file: "team-pulse-loading.html", shell: "operator", tab: "Dashboard" });</script>

</body>
</html>
