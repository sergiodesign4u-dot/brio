<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Brio - Wireframe: 404 Not found (11.0) - Public</title>
  <link rel="stylesheet" href="_wf.css">
  <!-- HTTP status: the host / CDN must serve this page with a real HTTP 404 for any
       unmatched URL. A soft-404 (this page served with a 200) is a defect. Server concern. -->
  <style>
    .wf-errcode { font-size: clamp(56px, 12vw, 96px); font-weight: 800; color: var(--wf-t-hi); line-height: 1; letter-spacing: -0.02em; }
    .wf-quick { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  </style>
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio"></nav>

    <div class="wf-content">
      <div class="wf-narrow" style="text-align:center;">

        <p class="wf-errcode" aria-hidden="true">404</p>
        <h1>Page not found</h1>
        <p class="wf-lead" style="margin:8px auto 0;">The page may have moved, or the link may be wrong.</p>

        <form action="help.html" method="get" role="search" aria-label="Search Brio help" style="margin-top:24px;text-align:left;">
          <label class="wf-field" for="q">
            <span class="k">Search Brio help</span>
            <div class="wf-copy">
              <input class="wf-input" id="q" name="q" type="search" placeholder="Search help and pages">
              <button class="wf-btn solid" type="submit">Search</button>
            </div>
          </label>
        </form>

        <nav class="wf-quick" aria-label="Quick links" style="justify-content:center;">
          <a class="wf-btn" href="home.html">Home</a>
          <a class="wf-btn" href="help.html">Help</a>
          <a class="wf-btn" href="pricing.html">Pricing</a>
          <a class="wf-btn" href="security-privacy.html">Security and privacy</a>
        </nav>

        <p class="wf-micro" style="margin-top:22px;">Still cannot find it? <a href="contact.html">Contact us</a>.</p>

      </div>
    </div>

    <footer class="wf-pubfoot" id="wf-appfoot"></footer>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "11.0", file: "not-found.html", shell: "public" });</script>

</body>
</html>
