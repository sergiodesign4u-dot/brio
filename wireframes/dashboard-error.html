<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Brio - Wireframe: Dashboard (4.0) - Error</title>
  <link rel="stylesheet" href="_wf.css">
</head>
<body>

<div class="wf-bar" id="wf-bar"></div>

<main>
  <div class="wf-screen">
    <nav class="wf-appbar" id="wf-appbar" aria-label="Brio app"></nav>

    <div class="wf-content">
      <header>
        <p class="wf-eyebrow">Welcome back, Priya</p>

      <div class="wf-grid">

            <div class="n">Could not load your pulse</div>

            <div class="wf-btns" style="justify-content:center;">
              <a class="wf-btn solid" href="dashboard.html">Retry</a>
              <a class="wf-btn" href="program-library.html">Go to Programs</a>

          <div class="wf-card">
            <div class="wf-strip2">Aggregate only. You never see who answered.</div>
          </div>
        </aside>
      </div>
    </div>

    <footer class="wf-appfoot" id="wf-appfoot"></footer>
    <nav class="wf-tabbar" id="wf-tabbar" aria-label="Brio app tabs"></nav>
  </div>
</main>

<script src="_nav.js"></script>
<script>BRIO_WF.render({ node: "4.0", file: "dashboard-error.html", shell: "operator", tab: "Dashboard" });</script>
